name: e2e

# PR-validation pipeline. Spins up the SPA against the published
# agelo-server image from GHCR + a fresh MySQL via Testcontainers,
# then runs the full Cucumber + Playwright suite.
#
# Triggers
#   - pull_request to master  → block merges that break the e2e suite
#   - workflow_dispatch       → re-run on demand

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  e2e:
    name: cucumber + playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR (read-only, for pulling agelo-server)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps chromium

      - name: Run e2e suite
        working-directory: e2e
        env:
          AGELO_COMPOSE_FILE: docker-compose.ci.yml
          AGELO_COMPOSE_DIR: ${{ github.workspace }}/e2e
          AGELO_SERVER_IMAGE: ghcr.io/agelo-platform/agelo-server:latest
        run: npm test

      - name: Upload failure screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-screenshots
          path: e2e/reports/
          if-no-files-found: ignore
          retention-days: 14
